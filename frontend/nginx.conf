server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static SPA — serve built assets, fall back to index.html for
    # client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container. Uses the Docker Compose
    # service name "backend" as the hostname (containers on the same
    # compose network resolve each other by service name) — mirrors what
    # vite.config.ts's dev-mode proxy does for `localhost:8000` locally.
    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
    }
}
