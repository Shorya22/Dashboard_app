# =============================================================================
# Roster METRIC semantics — business meaning, not file structure
# =============================================================================
# The ingestion contract (services/validation/configs/roster.yaml) says what a
# valid FILE looks like. This file says what the VALUES MEAN to the dashboard.
#
# Everything here is business policy that can change without the file format
# changing — which status counts as "still here", which words map to a
# seniority band. Editing this YAML changes the dashboard; no Python change,
# no redeploy of logic.
#
# Confirmed with the business owner 2026-07-22:
#   * Active and Strategic Pool are read from the `Status` column.
#   * Closing Headcount is cumulative by joining date and includes ONLY
#     Active + Strategic Pool — Inactive employees are never counted.
#   * Seniority bands are keyword matches on the `Seniorirty Level` column.

version: 2

# ---------------------------------------------------------------------------
# Column roles — which physical column plays which business role.
# ---------------------------------------------------------------------------
# Metrics refer to ROLES, never to raw column names, so a renamed source
# column is a one-line change here instead of a hunt through Python.
#
# The `client` role points at the canonical name "Client". The physical
# heading carries the reporting period ("Client as on June 2026") and
# changes every export, so roster.yaml matches it by PATTERN and renames it
# on read. Nothing here or in Python needs touching when the month rolls
# over.
columns:
  employee_id: "NEW_EMP_ID"          # identity; every headcount counts this distinctly
  employee_name: "NAME"
  designation: "Designation"         # what the "Departments" card counts
  client: "Client"                   # what the "Projects" card counts
  status: "Status"                   # Active / Inactive / Strategic Pool
  region: "Region"
  working_entity: "Working Entity"
  seniority: "Seniorirty Level"      # source-file typo kept verbatim
  experience_total: "Total Experience"
  primary_skill: "Primary Skill"    # stacked-bar rows on Skills & Experience
  skill: "Skill"                    # broader category — the Skills Covered card
  grade: "GRADE"
  work_location: "WORK_LOCATION"
  market: "Market"
  supervisor: "SUPERVISOR (Hexaware)"
  employment_type: "Type"                # GCC / Non GCC
  joining_date: "DOJ (DEPT)"             # drives Joiners + Month Wise Headcount
  leaving_date: "LWD"                    # drives Leavers / Month-Wise Resignation
  leaving_reason: "Reason for Leaving"   # drives Voluntary vs Involuntary
  snapshot_date: "Today"                 # "as of" date of the export

# ---------------------------------------------------------------------------
# Employee Directory — the searchable roster table.
# ---------------------------------------------------------------------------
# `fields` is the full record returned per employee: each output key maps to
# a column ROLE, so a renamed source column flows through here too (the old
# code read raw column names and would have broken on a rename). `columns`
# is the ordered set the TABLE shows, with display hints the frontend
# honours (serial = 1-based row number; experience = "x yrs"; grade = custom
# grade sort). Other keys in `fields` still power the filter dropdowns on the
# analytics pages even when not shown in the table.
directory:
  fields:
    employee_id: employee_id
    name: employee_name
    grade: grade
    designation: designation
    work_location: work_location
    total_experience: experience_total
    working_entity: working_entity
    client: client
    seniority_level: seniority
    region: region
    market: market
    status: status
    type: employment_type
    primary_skill: primary_skill
    skill: skill
    supervisor: supervisor
  trim_whitespace: [name, supervisor]   # double-space gotcha in source names
  columns:
    - {key: serial_no,        label: "S.No.",           display: serial}
    - {key: employee_id,      label: "Employee ID"}
    - {key: name,             label: "Name"}
    - {key: grade,            label: "Grade",            display: grade}
    - {key: designation,      label: "Designation"}
    - {key: work_location,    label: "Work Location"}
    - {key: total_experience, label: "Total Experience", display: experience}
    - {key: region,           label: "Region"}
    - {key: market,           label: "Market"}
    - {key: primary_skill,    label: "Primary Skill"}
    - {key: status,           label: "Status"}

# ---------------------------------------------------------------------------
# Filters — the dropdowns the HR pages filter by.
# ---------------------------------------------------------------------------
# Declared here so the API applies them against the same column roles the
# metrics use. Previously each page re-implemented these filters in the
# browser, comparing against hardcoded strings like `status === 'Active'`,
# which meant a status renamed in this file would silently stop matching
# on those pages while the backend followed along correctly.
filters:
  status:
    column_role: status
    label: "Status"
    type: multi
    applies_to_pages: [hr-portal-home, hr-analytics]
  department:
    column_role: designation
    label: "Department"
    type: multi
    applies_to_pages: [hr-portal-home, hr-analytics, workforce, skills-experience, employee-directory]
  # Region nests Market (each Market belongs to exactly one Region): the UI
  # narrows the Market dropdown to the selected Region, but the backend just
  # filters on whatever region/market values arrive — both are ANDed, which
  # is consistent because the hierarchy is strict.
  region:
    column_role: region
    label: "Region"
    type: multi
    nests: market
    applies_to_pages: [hr-portal-home, hr-analytics, workforce, skills-experience, employee-directory]
  market:
    column_role: market
    label: "Market"
    type: multi
    applies_to_pages: [hr-portal-home, hr-analytics, workforce, skills-experience, employee-directory]
  skill:
    column_role: primary_skill
    label: "Skill"
    type: multi
    applies_to_pages: [workforce, skills-experience]
  type:
    column_role: employment_type
    label: "Type"
    type: multi
    applies_to_pages: [skills-experience]
  allocation:
    column_role: client
    label: "Allocation"
    type: multi
    applies_to_pages: [employee-directory]
  grade:
    column_role: grade
    label: "Grade"
    type: multi
    applies_to_pages: [workforce]

  # DERIVED filters — they reuse a chart's own bucketing rules rather than
  # re-deriving the bands, so filtering by "5-8 Years" and the chart that
  # draws that band can never disagree about where the boundary is.

  # HR Analytics narrows the pre-aggregated month arrays (Month-Wise
  # Headcount, Joiners vs Leavers, Month-Wise Resignation) IN THE BROWSER
  # by month label — the roster endpoints don't accept a month filter
  # because there is no month column on the roster to filter against; the
  # trend/attrition endpoints return one row per available month and the
  # page keeps only the picked ones (see `monthFilter` in
  # `use-hr-analytics-filters.ts`). `client_only: true` marks that: the
  # filter has no `column_role` and doesn't flow through `apply_filters`.
  # `hierarchical` shape: the frontend nests each "Mon YYYY" leaf under its
  # Year group (see `monthsToHierarchy` in `frontend/src/lib/utilization-api.ts`).
  month_year:
    client_only: true
    label: "Month / Year"
    type: hierarchical
    applies_to_pages: [hr-analytics]

  experience:
    derived_from_chart: workforce_by_experience_band
    label: "Experience"
    type: multi
    applies_to_pages: [skills-experience]
  seniorityCategory:
    derived_from_chart: workforce_by_seniority_category
    label: "Seniority Category"
    type: multi
    applies_to_pages: [skills-experience, employee-directory]

# ---------------------------------------------------------------------------
# Card definitions — what each KPI on the dashboard counts.
# ---------------------------------------------------------------------------
# Documentation of record for the numbers on screen; the matching function
# in roster_metrics.py reads the same column roles above. Kept declarative
# so `docs/METRICS.md` and the code can't drift apart.
cards:
  total_employees:
    label: "Total Employees"
    counts: distinct
    column_role: employee_id
    status_filter: none              # deliberately NOT filtered by status
    note: >-
      Everyone in the file, whatever their status. A blank employee id is
      filled at ingestion with a NUMBERED marker ("NEW_EMP_ID TBD n") so
      each such person still counts once — a shared marker would merge
      them and a blank would be dropped entirely by the distinct count.
  active_employees:
    label: "Active Employees"
    counts: distinct
    column_role: employee_id
    status_filter: active
    note: Same definition as the Active Employees card on Home.
  departments:
    label: "Departments"
    counts: distinct
    column_role: designation
    normalize_case: true             # "SalesForce" and "Salesforce" count once
    note: >-
      Counts distinct job titles from the Designation column.
  strategic_pool:
    label: "Strategic Pool"
    counts: distinct
    column_role: employee_id
    status_filter: strategic_pool
    note: Same definition as the Strategic Pool card on Home.

  # The headline card is the present workforce: at full range the
  # joining-date test excludes nobody, since the range is derived from the
  # data itself. The per-MONTH values behind the growth trend DO need the
  # date walk, which is why `month_wise_headcount` declares this as a
  # `measure` rather than reusing this card.
  closing_headcount:
    label: "Closing Headcount"
    counts: distinct
    column_role: employee_id
    status_filter: present

  # Inactive Employees and Exits are the SAME people by the SAME rule
  # (Status = inactive) — declared as two cards only because they carry
  # different labels on different pages. Same status_filter, so they are
  # equal by construction; the exits_equals_inactive invariant guards it.
  inactive_employees:
    label: "Inactive Employees"
    counts: distinct
    column_role: employee_id
    status_filter: inactive

  # Confirmed 2026-07-22: Exits and Inactive are the same people, so they
  # are the same number — one definition, not two. This replaced an
  # LWD-date-based count that returned 5 while Inactive returned 14.
  #
  # The month-by-month charts still need a DATE to place an exit in time,
  # which only `LWD` provides, so they keep using `get_dated_exits` and
  # currently cover 5 of these 14. That difference is known and accepted:
  # this card answers "how many have left", the trend answers "when did
  # the ones we have dates for leave".
  exits:
    label: "Exits"
    counts: distinct
    column_role: employee_id
    status_filter: inactive

  skills_covered:
    label: "Skills Covered"
    counts: distinct
    column_role: skill
    exclude_containing: "TBD"        # e.g. "Skill TBD"; blanks excluded anyway
    note: >-
      Distinct `Skill` values (the broad category, not Primary Skill),
      excluding blanks and any value containing "TBD".

  projects:
    label: "Projects"
    counts: distinct
    column_role: client
    note: >-
      Counts distinct values of the client column. Cells can hold several
      comma-separated clients and the WHOLE cell is counted as one value,
      so "Barbour, PK Commerce" is one entry, not two. "Client TBD"
      (unallocated) is included.

# ---------------------------------------------------------------------------
# Chart definitions — what each breakdown on the dashboard splits by.
# ---------------------------------------------------------------------------
# Same idea as `cards:`, for the group-by charts. `scope` is declared
# explicitly per chart because it genuinely differs, and that must be a
# visible decision rather than an accident: HR Home describes the WHOLE
# roster (its headline card is Total Employees = 52, and Status Split has
# to show Inactive at all), while Home describes the CURRENT workforce
# (its headline is Closing Headcount = 38).
#
# `blank_label` is what an empty cell counts as. Blanks used to be dropped
# by the group-by, silently making the bars add up to less than the
# headline number with nothing on screen to say so. The labels match the
# "TBD" convention already present in the data, so a blank folds in with
# the existing TBD rows instead of creating a second bucket.
charts:
  status_split:
    label: "Status Split"
    type: count_by
    column_role: status
    scope: all
    # No bucket list on purpose: the slices are simply whatever statuses
    # the Status column contains. A status the business starts using shows
    # up on its own, with nothing to declare first. The only thing config
    # still decides is `counts_as_present` below — whether a status means
    # the person is still here — because that is a business meaning that
    # cannot be read off the data.

  headcount_by_region:
    label: "Headcount by Region"
    type: count_by
    column_role: region
    scope: all
    blank_label: "Region TBD"

  workforce_by_working_entity:
    label: "Workforce by Working Entity"
    type: count_by
    column_role: working_entity
    scope: all
    blank_label: "Entity TBD"

  workforce_by_experience_band:
    label: "Workforce by Experience Band"
    type: numeric_bands
    column_role: experience_total
    scope: all
    blank_label: "Unknown"
    # First band whose `below` the value falls under wins; the final entry
    # has no `below` and catches everything above. Half-open [lower, upper).
    # PROVISIONAL — the cut-offs were never confirmed against the source
    # model, so treat them as a best guess and change them here.
    bands:
      - below: 1
        label: "0-1 Years"
      - below: 3
        label: "1-3 Years"
      - below: 5
        label: "3-5 Years"
      - below: 8
        label: "5-8 Years"
      - label: "8+ Years"

  # Home page. Scoped to the current workforce so it describes the same
  # people as the cards beside it; the keyword rules live in `seniority:`.
  workforce_by_seniority_category:
    label: "Workforce by Seniority"
    type: keyword_bands
    column_role: seniority
    scope: present

  # Home. The same Status group-by as status_split, scoped to the current
  # workforce — so it shows Active + Strategic Pool and, by construction,
  # cannot disagree with the Status Split donut on HR Home.
  workforce_category_split:
    label: "Workforce Category"
    type: count_by
    column_role: status
    scope: present

  # --- Workforce page ----------------------------------------------------
  # Whole-roster composition (scope: all — the page's headline is Total
  # Employees = 52, not the present workforce). Both count distinct
  # employees; blanks fold into the dataset's own TBD convention rather
  # than being dropped.
  headcount_by_seniority:
    label: "Headcount by Seniority"
    type: count_by
    column_role: seniority          # RAW Seniorirty Level values, whatever they are
    scope: all
    blank_label: "Seniority TBD"

  workforce_by_type:
    label: "Workforce by Type"
    type: count_by
    column_role: employment_type    # GCC / Non GCC
    scope: all
    blank_label: "Type TBD"

  # --- Skills & Experience ----------------------------------------------
  # Stacked bars: Primary Skill x a dimension. Each dimension REUSES an
  # existing chart's bucketing (dimension_from_chart), so e.g. the
  # experience bands here are the very same ones the standalone experience
  # chart uses and cannot drift.
  skill_bifurcation_by_experience:
    label: "Skill Bifurcation by Experience"
    type: crosstab
    scope: all
    row_column_role: primary_skill
    row_key: primary_skill
    dimension_from_chart: workforce_by_experience_band
    dimension_key: experience_band

  skill_bifurcation_by_seniority:
    label: "Skill Bifurcation by Seniority"
    type: crosstab
    scope: all
    row_column_role: primary_skill
    row_key: primary_skill
    dimension_from_chart: workforce_by_seniority_category
    dimension_key: seniority_category

  skill_bifurcation_by_region:
    label: "Skill Bifurcation by Region"
    type: crosstab
    scope: all
    row_column_role: primary_skill
    row_key: primary_skill
    dimension_from_chart: headcount_by_region
    dimension_key: region

  # --- HR Analytics ------------------------------------------------------
  # `monthly_series` walks the dataset's month range and evaluates each
  # declared series per month. A series is either a `measure` (a named
  # metric evaluated for that month) or a `date_role` (count the rows whose
  # date falls inside the month). `key` is the field name the chart reads.
  month_wise_headcount:
    label: "Month Wise Headcount"
    type: monthly_series
    series:
      - key: closing_headcount
        measure: closing_headcount

  monthly_joiners_vs_leavers:
    label: "Monthly Joiners vs Leavers"
    type: monthly_series
    series:
      - key: joiners
        date_role: joining_date
      - key: exits
        date_role: leaving_date

  month_wise_resignation:
    label: "Month-Wise Resignation"
    type: monthly_series
    series:
      - key: exits
        date_role: leaving_date

  # A plain group-by on the leaving reason, scoped to people who actually
  # left (a leaving date recorded). Same shape as the HR Home charts.
  voluntary_vs_involuntary:
    label: "Voluntary vs Involuntary"
    type: count_by
    column_role: leaving_reason
    scope: exited

status:
  active: "Active"
  inactive: "Inactive"
  strategic_pool: "Strategic Pool"
  # The statuses that count as "currently part of the workforce". Every
  # present-headcount surface (Closing Headcount KPI, the month-wise growth
  # trend, and the workforce composition charts) is scoped to exactly this
  # list, so they can never disagree with each other. Add a new status here
  # to have it counted as present.
  counts_as_present:
    - "Active"
    - "Strategic Pool"

# ---------------------------------------------------------------------------
# Attrition — how a departure is classified.
# ---------------------------------------------------------------------------
# The Voluntary vs Involuntary donut splits on these values. Declared here
# so a business that renames them (or adds a third reason) changes config
# rather than Python.
attrition:
  reasons:
    voluntary: "Voluntary"
    involuntary: "Involuntary"

seniority:
  # First match wins, case-insensitive substring test. Order matters:
  # "Seniority TBD" contains "senior", so `tbd` must be tested before
  # `senior` or every TBD row would be mis-bucketed as Senior.
  categories:
    - contains: "tbd"
      label: "TBD"
    - contains: "lead"
      label: "Lead"
    - contains: "senior"
      label: "Senior"
    # Abbreviated form seen in older exports ("Hexa Sr"). Leading space so
    # it only matches "sr" as its own word, never inside another word.
    - contains: " sr"
      label: "Senior"
    - contains: "mid"
      label: "Mid"
  # Anything matching none of the above (e.g. "Premium Technical Service
  # Delivery Manager").
  default_label: "Other"
  # Blank/missing seniority value.
  missing_label: "Unknown"
