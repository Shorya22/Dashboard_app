# =============================================================================
# Utilization ground-truth dataset validation contract
# =============================================================================
# The Utilization_Long sheet of PowerBI_Ready_Utilization_May_2026.xlsx —
# one row per employee per week, with pre-computed utilization %. This is
# NOT test-only: GET /api/utilization/overview reads it directly, so it gets
# the same rigor as roster/booking. See roster.yaml header for how configs
# are consumed.
#
# Built from the 2026-07-21 full-file audit. Note the read block targets a
# specific named sheet (the workbook's first sheet is a README preamble).

file_type: ground_truth
schema_version: 1
display_name: Utilization Ground Truth
source_file: "PowerBI_Ready_Utilization_May_2026.xlsx"
read:
  sheet: "Utilization_Long"
  header: 0
allow_unknown_columns: false

columns:
  - name: "Global Department"
    dtype: categorical
    required: true
    nullable: false
  - name: "Department"
    dtype: categorical
    required: false
    nullable: false
  - name: "Employee"
    dtype: string          # join key to booking + roster
    required: true
    nullable: false
  - name: "Region (EC)"
    dtype: categorical
    required: false
    nullable: false
  - name: "Market (EC)"
    dtype: categorical
    required: false
    nullable: false
  - name: "Week Start"
    dtype: date            # always a Monday
    required: true
    nullable: false
  - name: "Weekly Utilization %"
    dtype: float
    required: true         # column must exist...
    nullable: true         # ...but 5/164 values are genuinely blank by design
    min: 0
    max: 1
  - name: "Period Total Utilization %"
    dtype: float
    required: true
    nullable: false        # fully populated, unlike Weekly
    min: 0
    max: 1

business_rules:
  # (Employee, Week Start) is a genuine composite primary key (0 dups in
  # real data) — a duplicate would double-count that employee's week.
  - name: employee_week_unique
    type: unique_together
    columns: ["Employee", "Week Start"]
    severity: error
    reason: "Each (Employee, Week Start) pair must appear only once"

  # Period Total is a period aggregate, so it is the same on every week-row
  # for a given employee. Surfaced as a warning (not a hard block) since a
  # future reporting change could legitimately alter this.
  - name: period_total_constant_per_employee
    type: constant_per_group
    group_by: "Employee"
    value_column: "Period Total Utilization %"
    tolerance: 0.0005
    severity: warning
    reason: "Period Total Utilization % should be constant across all weeks for an employee"
