# =============================================================================
# Utilization ground-truth dataset validation contract  — LIGHT MODE
# =============================================================================
# The Utilization_Long sheet of PowerBI_Ready_Utilization_May_2026.xlsx —
# one row per employee per week, with pre-computed utilization %. This is
# NOT test-only: GET /api/utilization/overview reads it directly, so it gets
# the same treatment as roster/booking. See roster.yaml header for how
# configs are consumed.
#
# v2 (2026-07-21) — DELIBERATELY LIGHT, matching the other two: structural
# checks only, plus a type on the columns the app computes with. No bounds
# (utilization is NOT capped at 1 — overtime can legitimately exceed 100%)
# and no cross-field rules. Those get layered back on later.
#
# Note the read block targets a specific named sheet (the workbook's first
# sheet is a README preamble).

file_type: ground_truth
schema_version: 2
display_name: Utilization Ground Truth
source_file: "PowerBI_Ready_Utilization_May_2026.xlsx"
read:
  sheet: "Utilization_Long"
  header: 0
allow_unknown_columns: true

columns:
  - name: "Global Department"
    dtype: any
    required: true
    nullable: true
  - name: "Department"
    dtype: any
    required: false
    nullable: true
  - name: "Employee"
    dtype: any             # join key to booking + roster
    required: true
    nullable: true
  - name: "Region (EC)"
    dtype: any
    required: false
    nullable: true
  - name: "Market (EC)"
    dtype: any
    required: false
    nullable: true
  # Typed: drives the weekly trend grouping.
  - name: "Week Start"
    dtype: date
    required: true
    nullable: true
  # Typed: averaged for the overview. Genuinely nullable — a blank week is
  # expected and meaningful (no booking-based rate that week), so it is NOT
  # defaulted to 0, which would drag the average down with a fake zero.
  - name: "Weekly Utilization %"
    dtype: float
    required: true
    nullable: true
  - name: "Period Total Utilization %"
    dtype: float
    required: true
    nullable: true

business_rules: []
