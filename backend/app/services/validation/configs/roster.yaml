# =============================================================================
# Roster dataset validation contract  — LIGHT MODE
# =============================================================================
# The single source of truth for what a valid employee-roster upload looks
# like. The validation ENGINE (engine.py / rules.py) is generic and reads
# this file — it contains no roster-specific knowledge. To change what is
# valid, edit THIS file and bump schema_version. Never edit Python for a
# value/rule change.
#
# v7 (2026-07-21) — DELIBERATELY LIGHT. Validation is now structural only:
#   * which columns must exist (this is what still catches a wrong file)
#   * a type only where the app does maths on the value
#   * blanks filled from `default` / `default_unique_prefix`
# Everything value-level was removed on purpose:
#   * no `allowed_values` literals — grade/region/entity/status/type/... may
#     hold any value, so a new one can never block an upload
#   * no min/max bounds
#   * no cross-field business rules
# Deeper rules get layered back on later, once the real variety of
# production files is known. Listing the columns is still worthwhile: it
# documents the expected shape and drives the template / "expected format"
# screen.

file_type: roster
schema_version: 7
display_name: Employee Roster
source_file: "DEPT - Master Data(Sheet1).xlsx"
read:
  sheet: 0
  header: 0
# Extra/unrecognized columns are reported but never block.
allow_unknown_columns: true

columns:
  # --- identifiers ---
  - name: "EMP ID"
    dtype: any
    required: false
    nullable: true
  # Blank -> "NEW_EMP_ID TBD n". Numbered per blank row on purpose: the
  # headcount measures are `NEW_EMP_ID.nunique()`, so one shared marker
  # would merge those employees into a single distinct value and
  # under-count headcount.
  - name: "NEW_EMP_ID"
    dtype: any
    required: true
    nullable: true
    unique: true
    default_unique_prefix: "NEW_EMP_ID TBD"
  - name: "NAME"
    dtype: any
    required: true
    nullable: true

  # --- classification (no fixed value lists — any value is accepted) ---
  - name: "GRADE"
    dtype: any
    required: true
    nullable: true
  - name: "Working Entity"
    dtype: any
    required: true
    nullable: true
  - name: "Region"
    dtype: any
    required: true
    nullable: true
  - name: "Type"
    dtype: any
    required: true
    nullable: true
  - name: "Status"
    dtype: any
    required: true
    nullable: true
  - name: "Declaration Signed"
    dtype: any
    required: false
    nullable: true
  - name: "DEPUTATION"
    dtype: any
    required: true
    nullable: true
  - name: "Market"
    dtype: any
    required: false
    nullable: true
  - name: "Primary Skill"
    dtype: any
    required: true
    nullable: true
  - name: "Skill"
    dtype: any
    required: true
    nullable: true
  - name: "Designation"
    dtype: any
    required: true
    nullable: true
  - name: "Seniorirty Level"   # source-file typo kept verbatim — do not "fix"
    dtype: any
    required: true
    nullable: true
  # Canonical name is plain "Client" (the source has been changed to use
  # that heading). `matches` keeps older exports working: a heading that
  # carried the reporting period — "Client as on June 2026", and it would
  # have changed every month — is matched by pattern and renamed to
  # "Client" on read, so those files still upload cleanly instead of
  # being rejected for a missing required column.
  - name: "Client"
    matches: "Client as on .*"
    dtype: any             # multi-value free text, "Client TBD" = bench
    required: true
    nullable: true
  - name: "Project Manager"
    dtype: any
    required: true
    nullable: true
  - name: "WORK_LOCATION"
    dtype: any
    required: false
    nullable: true
  - name: "SUPERVISOR (Hexaware)"
    dtype: any
    required: false
    nullable: true
  - name: "DEPT ID"
    dtype: any
    required: false
    nullable: true

  # --- dates: left untyped. They arrive as DD-Mon-YY text or as real dates
  #     depending on the export, and the app parses them itself with
  #     coercion, so pinning a type here only creates false rejections.
  - name: "DOJ (Hexaware)"
    dtype: any
    required: false
    nullable: true
  - name: "DOJ (DEPT)"
    dtype: any
    required: true
    nullable: true
  - name: "Today"
    dtype: any
    required: true
    nullable: true
  - name: "LWD"
    dtype: any
    required: true
    nullable: true
  - name: "Reason for Leaving"
    dtype: any
    required: true
    nullable: true

  # --- experience: the only typed columns, because the app averages and
  #     buckets these. Blank means "no recorded experience" -> 0.
  - name: "Hexaware Experience (Years)"
    dtype: float
    required: true
    nullable: true
    default: 0
  - name: "Before Hexaware Experience"
    dtype: float
    required: true
    nullable: true
    default: 0
  - name: "Total Experience"
    dtype: float
    required: true
    nullable: true
    default: 0

# No cross-field rules in light mode — experience is taken exactly as
# given and nothing is reconciled. Re-add here when ready.
business_rules: []
