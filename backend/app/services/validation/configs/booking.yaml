# =============================================================================
# Booking (time-booking) dataset validation contract  — LIGHT MODE
# =============================================================================
# Raw daily/weekly hours data — one row per employee/project/day/hours-type.
# Drives all utilization and hours metrics. See roster.yaml header for how
# this config is consumed (generic engine, edit-here-not-code).
#
# v3 (2026-07-21) — DELIBERATELY LIGHT, matching roster.yaml: structural
# checks only (which columns must exist), plus a type on the three columns
# the app actually computes with. No `allowed_values` literals, no bounds,
# no cross-field rules — those get layered back on later.
#
# Note: this file has NO natural single-row primary key (daily granularity
# means many legitimate rows share Employee+Week+Project+Type), so no
# uniqueness check is defined — inventing one would reject valid data.

file_type: booking
schema_version: 3
display_name: Time-Booking Data
source_file: "UTILIZATION DATA SHEET.xlsx"
read:
  sheet: 0
  header: 0
allow_unknown_columns: true

columns:
  # --- reporting hierarchy (any value accepted) ---
  - name: "Region (EC)"
    dtype: any
    required: true
    nullable: true
  - name: "Market (EC)"
    dtype: any
    required: true
    nullable: true
  - name: "Segment (EC)"
    dtype: any
    required: false
    nullable: true
  - name: "Global Department"
    dtype: any
    required: false
    nullable: true
  - name: "Department"
    dtype: any
    required: true
    nullable: true
  - name: "Team (EC)"
    dtype: any
    required: true
    nullable: true

  # --- client / project ---
  - name: "Holding"
    dtype: any             # the clean, one-value-per-row client field
    required: true
    nullable: true
  - name: "Project Name"
    dtype: any
    required: true
    nullable: true
  - name: "Project URL"
    dtype: any
    required: false
    nullable: true

  # --- employee (join key) ---
  # Rows with no Employee carry no attributable data and are dropped
  # downstream by prepare_booking_df; surfaced here as a warning so the
  # admin knows, but never blocking.
  - name: "Employee"
    dtype: any
    required: true
    nullable: true
    warn_if_null: true

  # --- dates ---
  - name: "Month"
    dtype: any             # unused; format varies across exports (date OR "Jun 26")
    required: false
    nullable: true
  # Typed: these two drive every weekly grouping/filter, so a non-date here
  # would break the charts rather than just look odd.
  - name: "Monday of Week"
    dtype: date
    required: true
    nullable: true
  - name: "Date"
    dtype: date
    required: true
    nullable: true

  # --- hours ---
  - name: "Booked Hours Type"
    dtype: any             # no fixed list; utilization splits on whatever is here
    required: true
    nullable: true
  # Typed: this is summed for every hours/utilization metric.
  - name: "Employee Booked Hours"
    dtype: float
    required: true
    nullable: true
    default: 0

business_rules: []
